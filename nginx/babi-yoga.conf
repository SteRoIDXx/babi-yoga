# ─────────────────────────────────────────────────────────────
# nginx-Config: babi-yoga.com — Hetzner VPS
# ─────────────────────────────────────────────────────────────
# Voraussetzungen:
#   1. Astro-Build: npm run build → dist/
#   2. dist/-Ordner auf den VPS kopieren (z.B. nach /var/www/babi-yoga)
#   3. SSL-Zertifikat via certbot (siehe Anleitung unten)
#
# Installation:
#   sudo cp babi-yoga.conf /etc/nginx/sites-available/babi-yoga.com
#   sudo ln -s /etc/nginx/sites-available/babi-yoga.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL einrichten (einmalig):
#   sudo certbot --nginx -d babi-yoga.com -d www.babi-yoga.com
# ─────────────────────────────────────────────────────────────

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name babi-yoga.com www.babi-yoga.com;
    return 301 https://babi-yoga.com$request_uri;
}

# www → non-www Redirect
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.babi-yoga.com;

    # SSL-Zertifikate (von certbot automatisch gesetzt)
    ssl_certificate     /etc/letsencrypt/live/babi-yoga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babi-yoga.com/privkey.pem;

    return 301 https://babi-yoga.com$request_uri;
}

# Haupt-Server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name babi-yoga.com;

    # ─── SSL ───────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/babi-yoga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/babi-yoga.com/privkey.pem;

    # Moderne SSL-Einstellungen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ─── Document Root ─────────────────────────────────────
    root /var/www/babi-yoga;
    index index.html;

    # ─── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self';" always;

    # ─── Gzip Compression ─────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ─── Caching ───────────────────────────────────────────
    # Statische Assets (Fonts, Bilder) — 1 Jahr
    location ~* \.(woff2|woff|ttf|eot|ico|webp|jpg|jpeg|png|gif|svg|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Astro-Build-Assets (mit Hash im Dateinamen) — 1 Jahr
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML-Seiten — kurz cachen (damit Updates schnell sichtbar)
    location ~* \.html$ {
        expires 10m;
        add_header Cache-Control "public, must-revalidate";
    }

    # ─── Routing ───────────────────────────────────────────
    # Astro generiert /yoga/index.html → nginx muss /yoga → /yoga/index.html auflösen
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ─── Decap CMS Admin ──────────────────────────────────
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ─── Sicherheit: Versteckte Dateien blockieren ────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Keine Logs für Favicon/Robots
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
